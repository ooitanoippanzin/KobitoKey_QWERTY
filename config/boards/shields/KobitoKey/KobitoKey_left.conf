CONFIG_ZMK_KEYBOARD_NAME="KobitoKey"

# ---- 基本機能 ----
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BLE=y
CONFIG_NFCT_PINS_AS_GPIOS=y

CONFIG_SPI=y
CONFIG_INPUT=y

# ---- PMW3610 トラックボール ----
CONFIG_PMW3610=y

# カーソル速度
CONFIG_PMW3610_CPI=400
CONFIG_PMW3610_CPI_DIVIDOR=1

# センサー向き（必要なら変更）
# CONFIG_PMW3610_ORIENTATION_90=y

# 軸反転（配置に合わせて）
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=n

# スクロール調整
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_SCROLL_X=y

# トラッキング精度
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_MOVEMENT_THRESHOLD=5

# ポーリングレート
CONFIG_PMW3610_POLLING_RATE_125=y

# Auto mouse
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=700

# 省電力
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20

# ---- BLE低遅延設定 ----
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# ---- センサー回転 ----
CONFIG_SENSOR_ROTATION=y

# ---- バッテリー ----
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# ---- Split keyboard ----
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# ---- ZMK Studio ----
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ---- RGB LED ----
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=1000

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=70
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=4
